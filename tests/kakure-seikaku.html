<!doctype html>
<html lang="ja">
<head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>隠れ性格診断｜5問でわかる本当のあなた</title><meta name="description" content="5個の質問で、ふだん人に見せていない本音や性格の傾向をやさしく診断します。" /><link rel="stylesheet" href="../style.css" /></head>
<body class="quiz-page">
<div class="top-stripe"></div>
<header class="site-header"><p class="mini-tagline">自分、見つかる。モヤモヤ、解消。やさしい診断サイト</p><a class="logo" href="../index.html">Kokoro Note</a><nav class="main-nav"><a href="../index.html">TOP</a><a href="../index.html#ranking">人気</a><a href="../index.html#categories">カテゴリ</a></nav></header>
<main>
<section class="quiz-hero"><h1>隠れ性格診断</h1><p class="lead">人に見せている自分と、心の奥にある本音。5個の質問から、あなたの隠れた性格タイプをやさしく読み解きます。</p><img src="../assets/images/thumb-personality.svg" alt="隠れ性格診断のイメージ画像" width="800" height="600" /></section>
<div class="ad-slot">スポンサーリンク / AdSense placeholder</div><form id="quiz"></form><button id="showResult" class="cta-btn" type="button">結果を見る</button><section id="result" class="result-box"></section><div class="ad-slot">スポンサーリンク / 結果下広告</div>
</main>
<script>
const questions=[
{q:'初対面の人が多い場所で、あなたは？',a:[['場を明るくしようと話す','A'],['様子を見ながら少しずつ話す','B'],['聞き役に回ることが多い','C'],['一人でも自然に過ごせる','D']]},
{q:'褒められた時の反応に近いのは？',a:[['素直に嬉しさを出す','A'],['照れながら受け取る','B'],['そんなことないと言いがち','C'],['心の中で静かに喜ぶ','D']]},
{q:'予定外のことが起きたら？',a:[['すぐ動いて何とかする','A'],['まず状況を整理する','B'],['少し不安になるが対応する','C'],['一度距離を置いて考える','D']]},
{q:'本当に疲れた時、あなたは？',a:[['誰かと話して回復する','A'],['信頼できる人にだけ話す','B'],['静かな場所で休みたい','C'],['完全に一人になりたい','D']]},
{q:'あなたが大切にしたいものは？',a:[['楽しさと勢い','A'],['安心できる関係','B'],['自分らしいペース','C'],['自由と余白','D']]}
];
const results={A:{name:'明るさで場を動かすタイプ',text:'あなたの隠れた魅力は、周囲の空気を少し軽くできるところ。表では気楽に見えても、実は人の反応をよく見ている繊細さもあります。勢いだけで頑張りすぎず、自分が安心できる場所も大切にすると、魅力がより自然に出てきます。'},B:{name:'空気を読めるバランスタイプ',text:'あなたは相手や場の雰囲気を見ながら、自然に距離を調整できる人です。強く主張しすぎない分、周りから信頼されやすい一方で、本音を後回しにしがちなところも。小さな希望から言葉にしてみると、もっと楽になります。'},C:{name:'やさしく深く考えるタイプ',text:'あなたは人の気持ちに敏感で、細かな変化にも気づきやすい人です。聞き役になることが多いかもしれませんが、その落ち着きは大きな魅力です。ただし、抱え込みすぎには注意。疲れた時は、無理に明るくしなくても大丈夫です。'},D:{name:'静かな自由を大切にするタイプ',text:'あなたは自分の世界を大切にできる人です。人に流されず、必要な距離を保てる強さがあります。一方で、周りからは少し近寄りにくく見えることも。信頼できる人には、少しだけ感情を見せると関係が深まりやすくなります。'}};
const form=document.querySelector('#quiz');form.innerHTML=questions.map((item,i)=>`<div class="question"><h3>Q${i+1}. ${item.q}</h3>${item.a.map(([text,type])=>`<button type="button" class="option" data-q="${i}" data-type="${type}">${text}</button>`).join('')}</div>`).join('');
document.addEventListener('click',e=>{if(!e.target.classList.contains('option'))return;const q=e.target.dataset.q;document.querySelectorAll(`.option[data-q="${q}"]`).forEach(b=>b.classList.remove('selected'));e.target.classList.add('selected');});
document.querySelector('#showResult').addEventListener('click',()=>{const scores={A:0,B:0,C:0,D:0};document.querySelectorAll('.option.selected').forEach(b=>scores[b.dataset.type]++);if(document.querySelectorAll('.option.selected').length<questions.length){alert('すべての質問に答えてください。');return;}const top=Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];const r=results[top];const box=document.querySelector('#result');box.innerHTML=`<h2>${r.name}</h2><p>${r.text}</p><p><a class="cta-btn" href="../index.html#ranking">他の診断を見る</a></p>`;box.classList.add('show');box.scrollIntoView({behavior:'smooth'});});
</script>
</body></html>
