<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>恋愛依存度診断｜5問でわかるあなたの恋愛傾向</title>
<meta name="description" content="5個の質問から、あなたの恋愛依存度や不安になりやすいポイントをやさしく診断します。" />
<link rel="stylesheet" href="../style.css" />
</head>
<body class="quiz-page">
<div class="top-stripe"></div>
<header class="site-header"><p class="mini-tagline">自分、見つかる。モヤモヤ、解消。やさしい診断サイト</p><a class="logo" href="../index.html">Kokoro Note</a><nav class="main-nav"><a href="../index.html">TOP</a><a href="../index.html#ranking">人気</a><a href="../index.html#categories">カテゴリ</a></nav></header>
<main>
<section class="quiz-hero"><h1>恋愛依存度診断</h1><p class="lead">好きになると不安になりやすい？それとも自然体でいられるタイプ？5個の質問から、あなたの恋愛のクセをそっと読み解きます。</p><img src="../assets/images/thumb-love.svg" alt="恋愛依存度診断のイメージ画像" width="800" height="600" /></section>
<div class="ad-slot">スポンサーリンク / AdSense placeholder</div>
<form id="quiz"></form>
<button id="showResult" class="cta-btn" type="button">結果を見る</button>
<section id="result" class="result-box"></section>
<div class="ad-slot">スポンサーリンク / 結果下広告</div>
</main>
<script>
const questions=[
{q:'好きな人から返信が遅い時、あなたは？',a:[['すぐ不安になって確認したくなる','A'],['少し気になるけど待てる','B'],['忙しいのかなと思う','C'],['自分の時間を楽しむ','D']]},
{q:'恋人の予定が急に変わったら？',a:[['嫌われたのかもと考える','A'],['理由を聞いて安心したい','B'],['少し残念だけど切り替える','C'],['自分も別の予定を楽しむ','D']]},
{q:'恋愛中のあなたに近いのは？',a:[['相手中心になりやすい','A'],['相手の反応が気になる','B'],['自分のペースも大事にする','C'],['恋愛以外の時間も大切','D']]},
{q:'不安な気持ちになった時は？',a:[['すぐ連絡して確認したい','A'],['少し時間を置いて話す','B'],['友達や趣味で気分転換する','C'],['一人で整理して落ち着ける','D']]},
{q:'今のあなたに必要なのは？',a:[['安心できる言葉','A'],['素直に話す時間','B'],['自分を大切にする余裕','C'],['自由に過ごせる空間','D']]}
];
const results={A:{name:'深く想いすぎるタイプ',text:'あなたは好きな人をとても大切にできる人。だからこそ、相手の小さな変化にも心が揺れやすい傾向があります。恋愛が生活の中心になりすぎる前に、自分の時間も少しずつ大切にしてみましょう。'},B:{name:'少し不安になりやすいタイプ',text:'あなたは恋愛に対してまっすぐで、相手との距離感を大切にしたい人です。不安を我慢しすぎず、安心したい気持ちをやさしく言葉にできると、もっと楽になります。'},C:{name:'自然体で向き合えるタイプ',text:'あなたは恋愛と自分の時間のバランスを比較的うまく取れる人です。必要以上に振り回されすぎない落ち着きがあります。嬉しいことや寂しいことを少しだけ言葉にすると、関係はもっと温かくなります。'},D:{name:'自由を大切にするタイプ',text:'あなたは恋愛に縛られすぎず、自分の世界を大切にできる人です。依存しすぎない姿勢は健やかですが、時々は好意をわかりやすく伝えることで、より安定した関係を築けます。'}};
const form=document.querySelector('#quiz');
form.innerHTML=questions.map((item,i)=>`<div class="question"><h3>Q${i+1}. ${item.q}</h3>${item.a.map(([text,type])=>`<button type="button" class="option" data-q="${i}" data-type="${type}">${text}</button>`).join('')}</div>`).join('');
document.addEventListener('click',e=>{if(!e.target.classList.contains('option'))return;const q=e.target.dataset.q;document.querySelectorAll(`.option[data-q="${q}"]`).forEach(b=>b.classList.remove('selected'));e.target.classList.add('selected');});
document.querySelector('#showResult').addEventListener('click',()=>{const scores={A:0,B:0,C:0,D:0};document.querySelectorAll('.option.selected').forEach(b=>scores[b.dataset.type]++);if(document.querySelectorAll('.option.selected').length<questions.length){alert('すべての質問に答えてください。');return;}const top=Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];const r=results[top];const box=document.querySelector('#result');box.innerHTML=`<h2>${r.name}</h2><p>${r.text}</p><p><a class="cta-btn" href="../index.html#ranking">他の診断を見る</a></p>`;box.classList.add('show');box.scrollIntoView({behavior:'smooth'});});
</script>
</body>
</html>
